<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Codons Compiler — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🧬</span>
                <div class="title-col">
                    <h1>DNA Codons Compiler</h1>
                    <p class="tagline">Renders DNA base sequences into RNA codons and amino acids.</p>
                </div>
            </div>
            <div class="badge">science</div>
        </header>

        <main class="workspace-card">
            
            <input type="text" id="dna-inp" value="TACGGC" style="width:100%; margin-bottom:12px; text-transform:uppercase;">
            <div style="font-size:18px;">RNA Codon: <strong id="rna-res" style="color:var(--accent);"></strong></div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
